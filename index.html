<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Flowtica — Buyer · Analyst · Growth. Strategy calls and a complete client acquisition system for businesses ready to grow."
    />
    <meta name="theme-color" content="#2563eb" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Flowtica — Buyer · Analyst · Growth</title>
    <script>
      // Companion to public/404.html — restore the original deep-link
      // path that 404.html encoded into a "?p=/path" query before the
      // SPA boots, so React Router sees the right URL.
      (function () {
        var l = window.location;
        if (l.search) {
          var q = {};
          l.search
            .slice(1)
            .split("&")
            .forEach(function (kv) {
              var eq = kv.indexOf("=");
              var k = kv.slice(0, eq);
              var v = decodeURIComponent(kv.slice(eq + 1)).replace(
                /~and~/g,
                "&",
              );
              q[k] = (q[k] ? q[k] + "&" : "") + v;
            });
          if (q.p !== undefined) {
            window.history.replaceState(
              null,
              null,
              l.pathname.slice(0, -1) +
                q.p +
                (q.q ? "?" + q.q : "") +
                l.hash,
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
