<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flowtica</title>
    <script>
      // GitHub Pages SPA fallback.
      // Translate any deep-link path into a hash-encoded redirect to
      // index.html so the SPA router can pick it up. The companion
      // bootstrap snippet in index.html below decodes the path back.
      (function () {
        var l = window.location;
        var segmentCount = 1; // "/dayana-web/" → 1 segment to keep
        var path =
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?p=/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash;
        l.replace(l.protocol + "//" + l.host + path);
      })();
    </script>
  </head>
  <body></body>
</html>
